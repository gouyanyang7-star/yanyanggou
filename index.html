<!DOCTYPE html>

</head>
<body>
    <!-- Enter 入口界面 -->
    <div id="enter-screen" class="enter-screen">

    <!-- HOME 主页面 -->
    <div id="home-page" class="home-page">

        <nav class="top-nav">
            <a href="./index.html" class="nav-item">
                <span class="nav-en">HOME</span>
                <span class="nav-zh">首页</span>
            </a>
            <a href="./about.html" class="nav-item">
                <span class="nav-en">ABOUT ME</span>
                <span class="nav-zh">关于我</span>
            </a>
            <a href="./fiction.html" class="nav-item">
                <span class="nav-en">FICTION</span>
                <span class="nav-zh">虚构</span>
            </a>
            <a href="./brunch.html" class="nav-item">
                <span class="nav-en">THE BRUNCH</span>
                <span class="nav-zh">早午餐</span>
            </a>
            <a href="./blog.html" class="nav-item">
                <span class="nav-en">BLOG</span>
                <span class="nav-zh">博客</span>
            </a>
            <a href="./photography.html" class="nav-item">
                <span class="nav-en">PHOTOGRAPHY</span>
                <span class="nav-zh">摄影</span>
            </a>
            <a href="./travel.html" class="nav-item">
                <span class="nav-en">TRAVEL</span>
                <span class="nav-zh">旅行</span>
            </a>
        </nav>

        <!-- HOME 导览区 - 极致错落纯文字布局 -->
        <section class="home-cover-section">
            <div class="home-cover-grid">
                <!-- 关于我 - 大方框 -->
                <a href="./about.html" class="cover-box cover-box--about">
                    <span class="cover-number">01</span>
                    <h2 class="cover-title-en">ABOUT ME</h2>
                    <p class="cover-title-zh">关于我</p>
                </a>

                <!-- 摄影 - 中方框 -->
                <a href="./photography.html" class="cover-box cover-box--photo">
                    <span class="cover-number">02</span>
                    <h2 class="cover-title-en">PHOTOGRAPHY</h2>
                    <p class="cover-title-zh">摄影</p>
                </a>

                <!-- 虚构 - 中方框 -->
                <a href="./fiction.html" class="cover-box cover-box--fiction">
                    <span class="cover-number">03</span>
                    <h2 class="cover-title-en">FICTION</h2>
                    <p class="cover-title-zh">虚构</p>
                    <span class="cover-tag">Coming Soon</span>
                </a>

                <!-- 博客 - 中方框 -->
                <a href="./blog.html" class="cover-box cover-box--blog">
                    <span class="cover-number">04</span>
                    <h2 class="cover-title-en">BLOG</h2>
                    <p class="cover-title-zh">博客</p>
                </a>

                <!-- The Brunch - 大方框 -->
                <a href="./brunch.html" class="cover-box cover-box--brunch">

                    <span class="cover-tag">Coming Soon</span>
                </a>
            </div>

        <section class="guestbook-home-section">
            <div class="guestbook-home-container">
                <h3 class="guestbook-home-title">留言板</h3>
                <div class="guestbook-home-input-wrapper">
                    <input type="text" id="home-message-input" class="guestbook-home-input" placeholder="写下你想说的话...">
                    <span class="guestbook-home-send" id="home-message-send">发送</span>
                </div>
                <div id="home-message-list" class="guestbook-home-list"></div>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-signature">
                <p class="footer-line">此致</p>
                <p class="footer-name">y</p>
            </div>
